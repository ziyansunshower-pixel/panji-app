<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#12100c">
  <title>盘迹 · 灯塔</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <span class="eyebrow">PANJI / THE LIGHTHOUSE</span>
      <h1>灯塔</h1>
      <p>北境炼器师留下的最后灯芯。</p>
    </header>

    <main>
      <section class="artifact-card" aria-labelledby="artifact-name">
        <div class="artifact-meta">
          <span id="bond-state">陌生</span>
          <span id="last-meeting">尚未相遇</span>
        </div>

        <div class="lighthouse-stage" aria-hidden="true">
          <div class="snow-field"></div>
          <div class="beacon-glow"></div>
          <div class="lighthouse">
            <i></i>
            <b></b>
            <span></span>
          </div>
        </div>

        <div class="artifact-copy">
          <span class="artifact-type">Artifact 01</span>
          <h2 id="artifact-name">灯塔</h2>
          <p id="artifact-line">灯火尚未认识你。</p>
        </div>
      </section>

      <section class="quiet-panel">
        <div class="section-title">
          <span class="eyebrow">MEETING</span>
          <h2>相遇</h2>
        </div>
        <p class="body-copy">靠近真实的 NFC 灯塔。若此刻不能扫描，也可以先留下一次模拟相遇，用来测试十天的携带感。</p>
        <div class="action-row">
          <button class="primary-button" id="scan-button">靠近灯塔</button>
          <button class="ghost-button" id="manual-scan-button">记录一次相遇</button>
        </div>
        <p class="support-copy" id="nfc-status">等待第一次相遇。</p>
      </section>

      <section class="stats-grid" aria-label="灯塔状态">
        <article>
          <span>当前状态</span>
          <strong id="state-label">陌生</strong>
        </article>
        <article>
          <span>已陪伴</span>
          <strong id="days-label">尚未开始</strong>
        </article>
        <article>
          <span>最近一次相遇</span>
          <strong id="last-label">无记录</strong>
        </article>
        <article>
          <span>器韵</span>
          <strong id="patina-label">黯淡</strong>
        </article>
      </section>

      <section class="quiet-panel">
        <div class="section-title">
          <span class="eyebrow">POLISH</span>
          <h2>盘</h2>
        </div>
        <p class="body-copy">没有需要完成的任务。只是让手心的温度，慢慢留在灯芯上。</p>
        <button class="primary-button full" id="polish-button">我盘了它一会儿</button>
        <p class="whisper" id="polish-message">这段时间会留下痕迹。</p>
      </section>

      <section class="quiet-panel">
        <div class="section-title">
          <span class="eyebrow">MEMORY</span>
          <h2>记忆碎片</h2>
        </div>
        <div class="fragment-list" id="fragment-list"></div>
      </section>

      <section class="lore-card">
        <span class="eyebrow">LORE</span>
        <p>灯塔并不会照亮道路。它存在的意义，是告诉主人：即使道路消失，灯火依然可以继续前行。</p>
      </section>
    </main>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>
  <script src="app.js"></script>
</body>
</html>
